version: 2
updates:
  # Terraform providers and modules
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"

  # Python dependencies (docker/Dockerfile pip installs)
  - package-ecosystem: "pip"
    directory: "/docker"
    schedule:
      interval: "weekly"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
